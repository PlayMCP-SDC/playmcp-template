name: Publish

# 태그 v* push 시 PyPI 에 배포한다.
on:
  push:
    tags:
      - "v*"

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # PyPI Trusted Publishing (OIDC) — 토큰 없이 인증한다.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        run: uv publish

